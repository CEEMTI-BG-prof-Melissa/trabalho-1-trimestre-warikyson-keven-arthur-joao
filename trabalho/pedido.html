<!DOCTYPE html>
<head>
<title>Restaurante Cardoso</title>
</head>
<body>

<h1>Restaurante Cardoso</h1>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGhq9tJNWyOP8PYTR4WuotTJyc-dPSQq7nhw&s">

<form>
<hr>
<h3>Selecionar produto</h3>
<input type="radio" name="produto" value="Cupim">Cupim<br>
<input type="radio" name="produto" value="Frango Frito">Frango Frito<br>
<input type="radio" name="produto" value="Strgonoff">Strogonoff<br>
<input type="radio" name="produto" value="Churrasco">Churrasco<br>
<input type="radio" name="produto" value="Fricassê">Fricassê<br>
<hr>

<h3>Adicionais</h3>
<input type="checkbox" name="adicional" value="pimenta"> Pimenta<br>
<input type="checkbox" name="adicional" value="Salpicão">Salpicão<br>
<input type="checkbox" name="adicional" value="Maionese">Maionese<br>
<input type="checkbox" name="adicional" value="Farofa">Farofa<br>
<hr>
<h3>Observação</h3>
<input type="text" name="observacao">

<h3>Formas de pagamento</h3>
<select name="pagamento">
<option value="dinheiro">Dinheiro</option>
<option value="cartaocredito">Cartão (Crédito)</option>
<option value="cartaodebito">Cartão (Débito)</option>
<option value="pix">Pix</option>
</select>

<h3>Endereço de entrega</h3>
<input type="text" name="endereco">

<br><br>
<button type="submit">Confirmar Pedido</button>
<br>
<a href="index.html">Ir Para Página Inicial</a>
</form>
